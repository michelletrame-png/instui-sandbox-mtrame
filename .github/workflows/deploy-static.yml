name: Deploy Static Export

on:
  workflow_dispatch:
    inputs:
      deploy_id:
        description: 'Static deploy ID (e.g. agent-patterns-v1)'
        required: true
      prototype_path:
        description: 'Prototype path (e.g. /agent-patterns)'
        required: true

permissions:
  contents: write

jobs:
  deploy:
    if: github.repository != 'instructure/instui-sandbox-base'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: node scripts/build-static.mjs
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          DEPLOY_ID: ${{ inputs.deploy_id }}
          PROTOTYPE_PATH: ${{ inputs.prototype_path }}

      - run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          npx gh-pages -d dist-static --dest static/${{ inputs.deploy_id }} --add --dotfiles
